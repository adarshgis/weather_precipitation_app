<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast Map</title>

    <!-- Leaflet CSS -->
    <link 
        rel="stylesheet" 
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" 
        integrity="sha256-sA+vL6a0sLGyt3K2jZ6PTiM6tI1wq6m81rjTRK7r0kM=" 
        crossorigin=""
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Weather Forecast Map</h2>

<!-- Slider Container -->
<div id="slider-container">
    <input type="range" id="forecast-slider" min="0" max="23" step="1" value="0">
    <span id="forecast-hour">Hour 5</span>
</div>

<!-- Map Container -->
<div id="map"></div>

<!-- Leaflet JS -->
<script 
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" 
    integrity="sha256-o9N1j8mtGSpD34X9m7b3aHn7eXfXEi42wBgiMM+0vY8=" 
    crossorigin="">
</script>

<!-- Custom Script -->
<script src="script.js"></script>
</body>
</html>
