name: Weather Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install GDAL
      run: |
        sudo apt-get update
        sudo apt-get install -y gdal-bin python3-gdal

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run weather pipeline
      run: |
        python scripts/04_run_pipeline.py

    - name: Commit updated tiles
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"

        if [ -d "tiles" ]; then
          git add tiles/
        fi

        git status
        git diff --cached --quiet || git commit -m "Update daily weather tiles"
        git push
