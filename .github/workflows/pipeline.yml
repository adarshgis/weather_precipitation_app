name: Weather Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "00 00 * * *"

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout repository
        uses: actions/checkout@v3

      # ---------------- PYTHON SETUP ----------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      # ---------------- GDAL INSTALL ----------------
      - name: Install GDAL
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      # ---------------- TILE TOOLS INSTALL (NEW) ----------------
      - name: Install Tippecanoe + PMTiles tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libsqlite3-dev zlib1g-dev

          git clone https://github.com/felt/tippecanoe.git /tmp/tippecanoe
          cd /tmp/tippecanoe
          make -j$(nproc)
          sudo mv tippecanoe /usr/local/bin/

      # ---------------- PYTHON DEPENDENCIES ----------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---------------- CREATE DIRECTORIES ----------------
      - name: Create data directories
        run: |
          mkdir -p data/raw_grib
          mkdir -p cogs
          mkdir -p geojson
          mkdir -p pmtiles   # NEW

      # ---------------- RUN PIPELINE ----------------
      - name: Run weather pipeline
        run: python scripts/04_run_pipeline.py

      # ---------------- BUILD PMTILES (NEW) ----------------
      - name: Convert GeoJSON to PMTiles
        run: |
          if [ -d "geojson" ]; then
            tippecanoe \
              -o pmtiles/weather.pmtiles \
              -zg \
              --drop-densest-as-needed \
              geojson/*.geojson
          fi

      # ---------------- COMMIT OUTPUT ----------------
      - name: Commit GeoJSON + PMTiles output
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # Add GeoJSON
          if [ -d "geojson" ]; then
            git add geojson/
          fi

          # Add PMTiles
          if [ -d "pmtiles" ]; then
            git add pmtiles/
          fi

          # Commit only if changes exist
          git diff --cached --quiet || git commit -m "Update GeoJSON + PMTiles (auto)"

          git pull --rebase
          git push
