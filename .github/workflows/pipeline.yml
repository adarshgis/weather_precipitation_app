name: Weather Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "00 00 * * *"

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT ----------------
      - name: Checkout repository
        uses: actions/checkout@v3

      # ---------------- PYTHON SETUP ----------------
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"

      # ---------------- GDAL INSTALL ----------------
      - name: Install GDAL
        run: |
          sudo apt-get update
          sudo apt-get install -y gdal-bin libgdal-dev

      # ---------------- PYTHON DEPENDENCIES ----------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ---------------- CREATE DIRECTORIES ----------------
      - name: Create data directories
        run: |
          mkdir -p data/raw_grib
          mkdir -p cogs
          mkdir -p geojson

      # ---------------- RUN PIPELINE ----------------
      - name: Run weather pipeline
        run: python scripts/04_run_pipeline.py

      # ---------------- COMMIT OUTPUT ----------------
      - name: Commit GeoJSON output
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          # Add only geojson outputs
          if [ -d "geojson" ]; then
            git add geojson/
          fi

          # Commit only if there are changes
          git diff --cached --quiet || git commit -m "Update precipitation GeoJSON (auto)"

          # Pull latest before push (avoid conflicts)
          git pull --rebase

          # Push changes
          git push
