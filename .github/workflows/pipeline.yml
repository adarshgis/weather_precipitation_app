name: Weather Pipeline Test

on:
  workflow_dispatch

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install GDAL
      run: |
        sudo apt-get update
        sudo apt-get install -y gdal-bin python3-gdal

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run pipeline
      run: |
        python scripts/03_run_pipeline.py

    - name: Commit updated COG files
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add data/cog/*
        git commit -m "Update daily COG files" || echo "No changes to commit"
        git push
